# ============================================================
# render.yaml
# Renderへの自動デプロイ設定ファイル（オプション）
# このファイルがあると、Renderがバックエンドの設定を自動認識します。
# ============================================================

services:
  - type: web
    name: audio-transcriber-backend
    env: node
    # ffmpegをインストールしてからnpm installを実行
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Renderダッシュボードで手動入力するため
